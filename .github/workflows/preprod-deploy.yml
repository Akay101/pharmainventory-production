name: PreProd Deploy Backend

on:
  push:
    branches:
      - pre-prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      ####################################################
      # LOGIN TO DOCKER HUB
      ####################################################

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ####################################################
      # BUILD API IMAGE
      ####################################################

      - name: Build Backend API Docker Image
        run: |
          docker build \
            -f ./backend-node/Dockerfile \
            -t pharmalogy/pharmalogy-backend:preprod \
            ./backend-node

      ####################################################
      # BUILD WORKER IMAGE
      ####################################################

      - name: Build Worker Docker Image
        run: |
          docker build \
            -f ./backend-node/Dockerfile.worker \
            -t pharmalogy/pharmalogy-worker:preprod \
            ./backend-node

      ####################################################
      # PUSH IMAGES
      ####################################################

      - name: Push Backend API Docker Image
        run: docker push pharmalogy/pharmalogy-backend:preprod

      - name: Push Worker Docker Image
        run: docker push pharmalogy/pharmalogy-worker:preprod

      ####################################################
      # DEPLOY
      ####################################################

      - name: Deploy to PreProd Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PREPROD_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.PREPROD_SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd ~
            bash deploy-preprod.sh
