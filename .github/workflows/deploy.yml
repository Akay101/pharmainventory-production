name: Auto Deploy Backend

on:
  push:
    branches:
      - main # change if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build Docker Image (IMPORTANT FIX)
      - name: Build Docker Image
        working-directory: ./backend-node
        run: docker build -t pharmalogy/pharmalogy-backend .

      # Step 4: Push Docker Image
      - name: Push Docker Image
        run: docker push pharmalogy/pharmalogy-backend

      # Step 5: SSH into server and deploy
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~
            ./deploy.sh
