name: Auto Deploy Backend

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest


steps:
  ####################################################
  # CHECKOUT CODE
  ####################################################
  - name: Checkout code
    uses: actions/checkout@v4

  ####################################################
  # LOGIN TO DOCKER HUB
  ####################################################
  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKER_USERNAME }}
      password: ${{ secrets.DOCKER_PASSWORD }}

  ####################################################
  # BUILD BACKEND API IMAGE
  ####################################################
  - name: Build Backend API Docker Image
    run: |
      docker build \
        -f ./backend-node/Dockerfile \
        -t pharmalogy/pharmalogy-backend:latest \
        ./backend-node

  ####################################################
  # BUILD WORKER IMAGE
  ####################################################
  - name: Build Worker Docker Image
    run: |
      docker build \
        -f ./backend-node/Dockerfile.worker \
        -t pharmalogy/pharmalogy-worker:latest \
        ./backend-node

  ####################################################
  # PUSH BACKEND IMAGE
  ####################################################
  - name: Push Backend API Docker Image
    run: docker push pharmalogy/pharmalogy-backend:latest

  ####################################################
  # PUSH WORKER IMAGE
  ####################################################
  - name: Push Worker Docker Image
    run: docker push pharmalogy/pharmalogy-worker:latest

  ####################################################
  # DEPLOY TO LIGHTSAIL
  ####################################################
  - name: Deploy to Lightsail
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.SERVER_HOST }}
      username: ubuntu
      key: ${{ secrets.SERVER_SSH_KEY }}
      script: |
        cd ~
        ./deploy.sh

